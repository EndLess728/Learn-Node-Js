services:
  postgres:
    image: postgres:16-alpine
    container_name: learning-node-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: learning_node
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
